<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adaptive Career Guidance — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1f2d45;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none;
  }
  .orb1 { width:400px; height:400px; background:rgba(59,130,246,.15); top:-100px; left:-100px; }
  .orb2 { width:350px; height:350px; background:rgba(139,92,246,.12); bottom:-80px; right:-80px; }
 
  .login-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 440px;
    padding: 20px;
  }
  .brand {
    text-align: center; margin-bottom: 36px;
  }
  .brand-icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
    box-shadow: 0 0 40px rgba(59,130,246,.35);
  }
  .brand h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .brand p  { color: var(--muted); font-size: 14px; margin-top: 4px; }
 
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 25px 60px rgba(0,0,0,.5);
  }
  .role-tabs {
    display: flex; gap: 8px; margin-bottom: 28px;
    background: var(--bg); border-radius: 10px; padding: 4px;
  }
  .role-tab {
    flex: 1; padding: 9px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s;
  }
  .role-tab.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 15px rgba(59,130,246,.3);
  }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  input {
    width: 100%; padding: 13px 16px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,.15);
  }
  .btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 16px; font-weight: 600;
    font-family: 'Syne', sans-serif; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 20px rgba(59,130,246,.4);
    margin-top: 8px;
  }
  .btn:hover  { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,.5); }
  .btn:active { transform: translateY(0); }
  .error-msg {
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    color: #fca5a5; padding: 12px 16px; border-radius: 10px;
    font-size: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
 
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <h1>ADAPTIVE CAREER GUIDANCE</h1>
    <p>AI-Powered Learning Intelligence Platform</p>
  </div>
 
  <div class="card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('student',this)">👨‍🎓 Student</button>
      <button class="role-tab" onclick="setRole('teacher',this)">👨‍🏫 Teacher</button>
    </div>
 
    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}
 
    <form method="POST" action="/login">
      <div class="form-group">
        <label id="id-label">Student ID</label>
        <input type="text" name="stuid" id="stuid-input"
               placeholder="enter your ID" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
  </div>
</div>
 
<script>
function setRole(role, btn) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const label = document.getElementById('id-label');
  const input = document.getElementById('stuid-input');
  if (role === 'teacher') {
    label.textContent = 'Teacher ID';
    input.placeholder = 'enter your ID';
  } else {
    label.textContent = 'Student ID';
    input.placeholder = 'enter your ID';
  }
}
</script>
</body>
</html>
